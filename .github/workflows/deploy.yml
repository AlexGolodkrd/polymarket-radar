name: Deploy radar to VPS

# Auto-deploy: triggered by push to main (typically after PR merge) or
# by manual workflow_dispatch. The deploy is gated on three secrets —
# VPS_HOST, VPS_USER, VPS_SSH_KEY — that the operator configured at
# https://github.com/AlexGolodkrd/plan-kapkan/settings/secrets/actions.
# Setup walkthrough lives in docs/DEPLOY_SETUP.md.
#
# Until the secrets are present the job soft-skips (writes a notice but
# does not fail) so that doc-only or pre-secrets pushes don't litter
# the Actions feed with red Xs.
on:
  push:
    branches: [main]
    # Skip auto-deploy for changes that don't affect the running radar:
    # docs, top-level markdown.
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - '.gitignore'
      # NB: 'executor-ts/**' was here but removed in v36-fix (09.05.2026):
      # the executor-ts service IS deployed by this workflow now (since
      # PR #121 added it to docker compose build/up), so changes there
      # MUST trigger a redeploy. PR #122 merged but auto-deploy didn't
      # fire because of the old paths-ignore — operator's TS container
      # never got the build fix.
  workflow_dispatch:
    inputs:
      reason:
        description: 'Why are you running this manually?'
        required: false
        default: 'manual deploy'

# Don't run two deploys in parallel. If a second commit lands while the
# first deploy is in flight, queue the second instead of racing on
# `git pull` and `docker restart`.
concurrency:
  group: deploy-vps
  cancel-in-progress: false

jobs:
  deploy:
    name: SSH to VPS, pull main, restart radar
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Check if deploy is configured
        id: check
        run: |
          missing=()
          for s in VPS_HOST VPS_USER VPS_SSH_KEY; do
            if [ -z "${!s}" ]; then
              missing+=("$s")
            fi
          done
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::notice::Auto-deploy is OFF — missing secrets: ${missing[*]}"
            echo "::notice::Setup guide: docs/DEPLOY_SETUP.md"
            echo "configured=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Auto-deploy is ON — required secrets present."
          echo "configured=true" >> "$GITHUB_OUTPUT"
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}

      - name: Deploy via SSH
        if: steps.check.outputs.configured == 'true'
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          # Bumped to 20m (was 8m) because the FIRST deploy that builds
          # the executor-ts image cold (alpine pull + npm install + tsc
          # compile + image bake) takes 12-18min on a 1-vCPU VPS.
          # Subsequent code-only deploys reuse cached layers and finish
          # in ~30-60s. timeout-minutes raised to 25m at the job level.
          command_timeout: 20m
          # Phase v33-fix-2 (08.05.2026): script_stop=true makes drone-ssh
          # inject `DRONE_SSH_PREV_COMMAND_EXIT_CODE=$? ; if [ ... ]; fi;`
          # AFTER EVERY LINE as a separate sub-command. That injection
          # broke `python3 -c "..."` (multi-line python parsed line-by-
          # line, injection ended up inside python source) on runs #9
          # and #10. Disabling restores normal bash semantics — we still
          # have `set -euo pipefail` at the top of the script body for
          # error handling.
          script_stop: false
          script: |
            set -euo pipefail
            # Phase deploy-fix-1 (07.05.2026, run #1 failed):
            # `drone-ssh` (used by appleboy/ssh-action) does not expand
            # `~` inside the script body — the literal path "~/plan-kapkan"
            # was passed to `cd` and bash threw "No such file or directory".
            # Use an absolute path with $HOME as the canonical fallback,
            # and let the operator override via VPS_REPO_DIR secret.
            REPO_DIR="${{ secrets.VPS_REPO_DIR || '' }}"
            if [ -z "$REPO_DIR" ]; then
              REPO_DIR="$HOME/plan-kapkan"
            fi
            if [ ! -d "$REPO_DIR" ]; then
              echo "::error::REPO_DIR=$REPO_DIR does not exist"
              echo "  HOME=$HOME"
              echo "  Listing $HOME:"
              ls -la "$HOME"
              echo "  Set VPS_REPO_DIR secret to the actual path."
              exit 1
            fi
            cd "$REPO_DIR"

            CUR_SHA=$(git rev-parse --short HEAD)
            echo "== current commit: $CUR_SHA =="

            git fetch origin --quiet
            git checkout main
            git pull --ff-only origin main
            NEW_SHA=$(git rev-parse --short HEAD)
            echo "== new commit:     $NEW_SHA =="

            if [ "$CUR_SHA" = "$NEW_SHA" ]; then
              echo "  (no new commits — restarting anyway in case env changed)"
            fi

            # Phase deploy-fix-2 (08.05.2026) — rebuild image, not just
            # restart. The Dockerfile uses `COPY Scripts/ ./Scripts/`, so
            # the radar code lives INSIDE the image, not on a host volume.
            # `docker restart` alone runs the same stale image; `git pull`
            # only updates files the container never reads. This was the
            # silent reason v29/v30/v31/v32 fixes were merged but never
            # active on production — operator's screenshot 08.05.2026
            # showed Fulham × Bournemouth Exact Score deals still active
            # despite v32 being merged 2 hours earlier.
            #
            # `docker compose up -d --build` rebuilds the image (cache-
            # aware: only changed layers) and recreates the container with
            # the new image. The watchdog container is auto-recreated too
            # since it shares the same image. This adds ~30-90s to deploy
            # depending on what changed (cached pip install layer keeps
            # it fast for code-only changes).
            # Phase 19v33: pass git commit + build time as build args so
            # the running container's /api/version can confirm the new
            # code is actually serving traffic (not the previous image
            # layer). Without this stamp, a cache hit could silently keep
            # serving stale code with no detectable signal.
            #
            # Phase v33-fix-1 (08.05.2026): use FULL SHA, not $NEW_SHA
            # which was the SHORT form. The verification step below
            # compares against `git rev-parse HEAD` (full) — earlier
            # mismatch was self-inflicted by passing short for build
            # then comparing to full.
            export GIT_COMMIT="$(git rev-parse HEAD)"
            export BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            # Phase TS-3-deploy (09.05.2026): also build + start the
            # executor-ts service. Operator's 09.05 trace showed
            # `docker logs plan-kapkan-executor-ts` returned
            # "No such container" — the TS service was in compose but
            # never started by deploy.yml's `docker compose up radar
            # watchdog`. Adding it here ensures auto-deploy brings it
            # up alongside the radar.
            docker compose build \
              --build-arg GIT_COMMIT="$GIT_COMMIT" \
              --build-arg BUILD_TIME="$BUILD_TIME" \
              radar executor-ts
            docker compose up -d --no-build radar watchdog executor-ts
            sleep 5

            echo "== container status =="
            docker ps --filter name=plan-kapkan-radar \
              --format 'table {{.Names}}\t{{.Status}}'

            echo "== healthcheck =="
            # Radar warms up its WS subscriptions before the HTTP endpoint
            # comes online. Retry up to 6 times (= 30s total) before
            # giving up and dumping the last 50 log lines.
            for i in 1 2 3 4 5 6; do
              if curl -sf -m 3 http://localhost:5050/api/risk_status >/dev/null; then
                echo "  ✓ /api/risk_status responding (attempt $i/6)"
                break
              fi
              echo "  waiting for radar... (attempt $i/6)"
              sleep 5
              if [ "$i" = "6" ]; then
                echo "::error::Radar did not respond after 30s post-restart"
                docker logs --tail 50 plan-kapkan-radar
                exit 1
              fi
            done

            # Phase 19v33 (08.05.2026) — version-stamp verification.
            # script_stop is now false (see input above) so drone-ssh
            # passes the script body verbatim to remote bash without
            # per-line injection. Heredoc once again works — single
            # python invocation reads expected sha from $1, fetches
            # /api/version, compares.
            echo "== version verification =="
            EXPECTED_SHA=$(git rev-parse HEAD)
            # Capture python exit code without triggering set -e early so
            # we can dump container logs on failure before propagating.
            set +e
            python3 - "$EXPECTED_SHA" <<'PYE'
            import json, sys, urllib.request
            expected = sys.argv[1].strip()
            try:
                with urllib.request.urlopen(
                    'http://localhost:5050/api/version', timeout=5,
                ) as r:
                    v = json.load(r)
            except Exception as e:
                print(f'::error::failed to fetch /api/version: {e}')
                sys.exit(1)
            running = (v.get('commit') or 'unknown').strip()
            print(f'  expected: {expected}')
            print(f'  running:  {running}')
            if running == expected:
                print('  OK running commit matches expected')
                sys.exit(0)
            if running == 'unknown':
                print('::warning::unknown — image built before Phase 19v33 ARG; next deploy stamps it')
                sys.exit(0)
            print(f'::error::Running commit ({running}) != expected ({expected}). Aborting.')
            sys.exit(1)
            PYE
            VERIFY_RC=$?
            set -e
            if [ "$VERIFY_RC" -ne 0 ]; then
              docker logs --tail 50 plan-kapkan-radar
              exit "$VERIFY_RC"
            fi

            echo "== deploy success: $NEW_SHA =="

      - name: Notify Telegram on failure (optional)
        if: failure() && steps.check.outputs.configured == 'true' && env.TELEGRAM_BOT_TOKEN != ''
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=⚠ VPS deploy FAILED on commit ${{ github.sha }} — see Actions log: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
