name: Restore prod (snim killswitch + DRY_RUN=1 + restart)

# Manual workflow only — emergency restore of the radar after a
# killswitch event or an env-state misconfiguration. Operator-safe:
# does NOT touch git / does NOT rebuild image / does NOT modify any
# code. Only state actions:
#
#   1. Remove Executions/.killed (snimi killswitch)
#   2. Ensure DRY_RUN=1 in Credentials.env (paper trading mode)
#   3. docker compose up -d --force-recreate (reload env_file)
#
# Phase audit-28b cont 4 (28.05.2026) — added `set -x` debug trace +
# ERR trap so we can pinpoint which command tripped exit 1 (run #2
# failed silently between "STEP 1" banner and process-exit message,
# zero diagnostic).
on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type RESTORE to confirm (case-sensitive, anything else aborts)'
        required: true
        default: ''
      reason:
        description: 'Why restoring? (free text, goes to logs)'
        required: false
        default: ''

concurrency:
  group: deploy-vps
  cancel-in-progress: false

jobs:
  restore:
    name: Snim killswitch + DRY_RUN=1 + restart
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Confirm input
        run: |
          if [ "${{ inputs.confirm }}" != "RESTORE" ]; then
            echo "::error::Confirm field must equal RESTORE (case-sensitive). Got: '${{ inputs.confirm }}'"
            exit 1
          fi
          echo "Restore reason: ${{ inputs.reason }}"

      - name: SSH + restore state + restart
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          command_timeout: 4m
          # Phase audit-28b cont 5 — script_stop=false so drone-ssh's
          # per-command exit-code check doesn't abort the workflow on
          # idempotent `[ -f file ]` tests that return 1. Run #2/#3
          # failed exactly because Executions/.killed was correctly
          # removed in run #1, so the `[ -f ... ]` test returned 1
          # (file absent), and drone-ssh's `script_stop: true` treated
          # that as fatal. Manual `EXIT_ON_ERR` gate after critical
          # blocks replaces the heavy-handed wrapper.
          script_stop: false
          script: |
            # Phase audit-28b cont 5 — `script_stop: false` on the
            # action side means drone-ssh's per-command wrapper is OFF.
            # We manage errors explicitly. `set -x` for trace.
            set -x
            EXIT_CODE=0

            REPO_DIR="${{ secrets.VPS_REPO_DIR }}"
            if [ -z "$REPO_DIR" ]; then
              REPO_DIR="$HOME/plan-kapkan"
            fi
            echo "[restore] REPO_DIR=$REPO_DIR"

            cd "$REPO_DIR" || { echo "[restore] FATAL: cannot cd"; ls -la "$HOME"; exit 1; }
            echo "[restore] cwd=$(pwd)"
            echo "[restore] user=$(id)"
            docker --version || true
            docker compose version || docker-compose --version || true
            ls -la | head -20

            echo "=== STEP 1: Pre-state probe ==="
            if [ -f Executions/.killed ]; then
              echo "[step1] Executions/.killed EXISTS"
              cat Executions/.killed || echo "[step1] (cat failed, continuing)"
            else
              echo "[step1] Executions/.killed absent (good)"
            fi
            if [ -f Credentials.env ]; then
              grep -E '^DRY_RUN=' Credentials.env || echo "[step1] (no DRY_RUN line)"
            else
              echo "[step1] FATAL: Credentials.env not found in $(pwd)"
              ls -la
              EXIT_CODE=1
            fi

            echo "=== STEP 2: Snim killswitch ==="
            if [ -f Executions/.killed ]; then
              STAMP=$(date -u +%Y%m%dT%H%M%SZ)
              cp -p Executions/.killed "Executions/.killed.backup_$STAMP" || echo "[step2] backup failed"
              rm -f Executions/.killed
              echo "[step2] Removed Executions/.killed"
            else
              echo "[step2] Skip — already absent"
            fi

            echo "=== STEP 3: Ensure DRY_RUN=1 ==="
            if grep -qE '^DRY_RUN=' Credentials.env; then
              sed -i 's/^DRY_RUN=.*/DRY_RUN=1/' Credentials.env
              echo "[step3] DRY_RUN line updated to =1"
            else
              echo "DRY_RUN=1" >> Credentials.env
              echo "[step3] DRY_RUN=1 appended"
            fi
            grep -E '^DRY_RUN=' Credentials.env

            echo "=== STEP 4: docker compose up -d --force-recreate ==="
            if docker compose up -d --force-recreate radar executor-ts 2>&1; then
              echo "[step4] up -d --force-recreate OK"
            else
              echo "[step4] up -d --force-recreate had non-zero exit; trying fallback restart"
              docker compose restart radar executor-ts 2>&1 || \
                echo "[step4] fallback restart also failed"
            fi

            echo "=== STEP 5: Wait for radar healthcheck (max 60s) ==="
            for i in $(seq 1 30); do
              if curl -fsS -m 3 http://localhost:5050/api/risk_status >/dev/null 2>&1; then
                echo "[step5] radar responding (attempt $i)"
                break
              fi
              sleep 2
            done

            echo "=== STEP 6: Post-state probe ==="
            curl -fsS -m 5 http://localhost:5050/api/risk_status 2>&1 \
              | python3 -c "import json, sys; d = json.load(sys.stdin); print(f'  killed: {d.get(\"killed\")}'); print(f'  daily_loss_remaining: \${d.get(\"daily_loss_remaining_usd\")}')" \
              || echo "  (could not parse risk_status)"
            curl -fsS -m 5 http://localhost:5051/risk_status 2>&1 \
              | python3 -c "import json, sys; d = json.load(sys.stdin); print(f'  dry_run: {d.get(\"dry_run\")}')" \
              || echo "  (executor-ts probe failed — may need more boot time)"
            docker compose ps 2>&1 | head -20

            echo "=== RESTORE COMPLETE ==="
            # Final exit: 0 if no critical step set EXIT_CODE.
            exit $EXIT_CODE
