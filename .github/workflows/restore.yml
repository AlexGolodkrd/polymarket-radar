name: Restore prod (snim killswitch + DRY_RUN=1 + restart)

# Manual workflow only — emergency restore of the radar after a
# killswitch event or an env-state misconfiguration. Operator-safe:
# does NOT touch git / does NOT rebuild image / does NOT modify any
# code. Only state actions:
#
#   1. Remove Executions/.killed (snimi killswitch)
#   2. Ensure DRY_RUN=1 in Credentials.env (paper trading mode)
#   3. docker compose restart radar executor-ts (no rebuild)
#
# Requires same secrets as deploy.yml (VPS_HOST, VPS_USER, VPS_SSH_KEY).
#
# Usage:
#   Actions tab → "Restore prod (snim killswitch + DRY_RUN=1 + restart)"
#   → Run workflow → choose main → type RESTORE in confirm → Run.
#
# Phase audit-28b cont 3 (27.05.2026). Operator-requested after I (agent)
# pushed killswitch and DRY_RUN flip decisions back to operator
# repeatedly. The workflow exists so agent can dispatch via REST API
# with operator's "да" — no SSH key needed in agent's env.
on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type RESTORE to confirm (case-sensitive, anything else aborts)'
        required: true
        default: ''
      reason:
        description: 'Why restoring? (free text, goes to logs)'
        required: false
        default: ''

concurrency:
  group: deploy-vps
  cancel-in-progress: false

jobs:
  restore:
    name: Snim killswitch + DRY_RUN=1 + restart
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Confirm input
        run: |
          if [ "${{ inputs.confirm }}" != "RESTORE" ]; then
            echo "::error::Confirm field must equal RESTORE (case-sensitive). Got: '${{ inputs.confirm }}'"
            exit 1
          fi
          echo "Restore reason: ${{ inputs.reason }}"

      - name: SSH + restore state + restart
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          command_timeout: 4m
          script_stop: true
          script: |
            set -euo pipefail
            REPO_DIR="${{ secrets.VPS_REPO_DIR || '' }}"
            if [ -z "$REPO_DIR" ]; then
              REPO_DIR="$HOME/plan-kapkan"
            fi
            cd "$REPO_DIR"

            echo "=== STEP 1: Pre-state probe ==="
            if [ -f Executions/.killed ]; then
              echo "  Executions/.killed EXISTS"
              cat Executions/.killed
            else
              echo "  Executions/.killed absent (good)"
            fi
            echo "  Current DRY_RUN in Credentials.env:"
            grep -E '^DRY_RUN=' Credentials.env || echo "    (no DRY_RUN line)"

            echo ""
            echo "=== STEP 2: Snim killswitch ==="
            if [ -f Executions/.killed ]; then
              # Backup the killed flag before removal, so post-mortem stays
              STAMP=$(date -u +%Y%m%dT%H%M%SZ)
              cp -p Executions/.killed "Executions/.killed.backup_$STAMP"
              rm -f Executions/.killed
              echo "  Removed Executions/.killed (backup: .killed.backup_$STAMP)"
            else
              echo "  Skip — already absent"
            fi

            echo ""
            echo "=== STEP 3: Ensure DRY_RUN=1 ==="
            # Replace any DRY_RUN=... line with DRY_RUN=1; add if missing.
            if grep -qE '^DRY_RUN=' Credentials.env; then
              sed -i 's/^DRY_RUN=.*/DRY_RUN=1/' Credentials.env
              echo "  DRY_RUN line updated to =1"
            else
              echo "DRY_RUN=1" >> Credentials.env
              echo "  DRY_RUN=1 appended"
            fi
            grep -E '^DRY_RUN=' Credentials.env

            echo ""
            echo "=== STEP 4: docker compose up -d (force-recreate to reload env_file) ==="
            # CRITICAL: `docker compose restart` does NOT reload env_file
            # changes. It just SIGTERMs the existing container with the
            # ORIGINAL env. Our restore changed DRY_RUN in Credentials.env
            # — without force-recreate the change is invisible to the
            # process inside the container.
            #
            # `up -d` recreates the container if its config (incl. env_file
            # content via Compose hash) changed. `--force-recreate` makes
            # this unconditional — even if Compose thinks nothing changed,
            # the container is destroyed + recreated, picking up the new
            # Credentials.env values.
            #
            # No --build flag — we use the existing image, just re-init
            # the container env. Fast (~5s vs 30-60s rebuild).
            docker compose up -d --force-recreate radar executor-ts
            echo "  Containers recreated (env_file reloaded)"

            echo ""
            echo "=== STEP 5: Wait for radar healthcheck (max 60s) ==="
            for i in $(seq 1 30); do
              if curl -fsS -m 3 http://localhost:5050/api/risk_status >/dev/null 2>&1; then
                echo "  radar responding (attempt $i)"
                break
              fi
              sleep 2
            done

            echo ""
            echo "=== STEP 6: Post-state probe ==="
            echo "  killswitch state:"
            curl -fsS -m 5 http://localhost:5050/api/risk_status 2>/dev/null \
              | python3 -c "import json, sys; d = json.load(sys.stdin); print(f'    killed: {d.get(\"killed\")}'); print(f'    daily_loss_remaining: \${d.get(\"daily_loss_remaining_usd\")}')" \
              || echo "    (could not parse risk_status)"
            echo "  TS executor dry_run:"
            curl -fsS -m 5 http://localhost:5051/risk_status 2>/dev/null \
              | python3 -c "import json, sys; d = json.load(sys.stdin); print(f'    dry_run: {d.get(\"dry_run\")}')" \
              || echo "    (executor-ts probe failed — may need more boot time)"

            echo ""
            echo "=== RESTORE COMPLETE ==="
