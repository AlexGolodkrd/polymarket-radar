# plan-kapkan arbitrage radar — Phase 6 VPS deployment.
#
# Bring up the stack:
#   docker compose up -d
#
# View logs:
#   docker compose logs -f radar
#   docker compose logs -f watchdog
#
# Tear down:
#   docker compose down
#
# Two services share /app/Executions via a host bind mount so the
# radar's writes (paper_results.jsonl, dryrun.jsonl, .killed flag) are
# visible to the watchdog. The volume also survives a container
# restart, so the daily-loss accumulator and graduation history don't
# get wiped.

services:
  radar:
    build:
      context: .
      # Phase 19v33 (08.05.2026) — build args for /api/version verification.
      # deploy.yml passes these via:
      #   GIT_COMMIT=$(git rev-parse HEAD) BUILD_TIME=$(date -u ...) \
      #     docker compose build radar
      # The Dockerfile's ARG declarations consume them and bake them into
      # ENV so /api/version can return the actual running commit.
      args:
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
        BUILD_TIME: ${BUILD_TIME:-unknown}
    image: plan-kapkan-radar:latest
    container_name: plan-kapkan-radar
    restart: unless-stopped
    # Phase 19v4 (02.05.2026) — SYS_PTRACE для py-spy профайлинга hung
    # gunicorn worker. Без этого `py-spy dump --pid X` returns
    # "Permission denied (os error 13)". Это БЕЗОПАСНАЯ capability —
    # позволяет inspect processes (ptrace), НЕ root escalation.
    # Использование:
    #   docker exec -u root plan-kapkan-radar \
    #     /home/radar/.local/bin/py-spy dump --pid <gunicorn-worker-pid>
    cap_add:
      - SYS_PTRACE
    ports:
      - "5050:5050"
    volumes:
      - ./Executions:/app/Executions
    env_file:
      - Credentials.env
    environment:
      # Default to dry-run. Override in Credentials.env (DRY_RUN=0)
      # only after Phase 5 graduation gate passes.
      DRY_RUN: ${DRY_RUN:-1}
      WALLET_BACKEND: ${WALLET_BACKEND:-local}
    healthcheck:
      test: ["CMD", "curl", "-fsSL", "http://localhost:5050/api/risk_status"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  # Watchdog: standalone process that polls Executions/.killed every second.
  # If the kill switch is tripped (or the radar process has crashed) it
  # cancels pending orders directly via each exchange's REST API. Runs as
  # a separate container so a hung radar interpreter cannot block it.
  #
  # Phase 6 ships the loop skeleton; the actual cancel logic lights up once
  # Phase 4 wallet keys are loaded (watchdog can sign cancellation requests).
  watchdog:
    build: .
    image: plan-kapkan-radar:latest
    container_name: plan-kapkan-watchdog
    restart: unless-stopped
    volumes:
      - ./Executions:/app/Executions
    env_file:
      - Credentials.env
    command: ["python", "Scripts/watchdog.py"]
    depends_on:
      - radar

  # Phase TS-3 (08.05.2026) — TypeScript executor service.
  # Runs alongside the Python radar. The radar can switch to this
  # executor by setting EXECUTOR_URL=http://executor-ts:5051 in its env
  # (see Scripts/arb_server.py POST /fire dispatcher). Until the switch
  # is flipped, this service runs idle on port 5051 and serves only
  # GET /healthz, GET /version, GET /risk_status (for the operator to
  # inspect via curl).
  #
  # Builds from executor-ts/ subfolder. Healthcheck on /healthz.
  # Bind-mounts the same Executions/ dir so analytics/dryrun jsonl
  # writes are visible to the radar's analytics aggregator.
  executor-ts:
    build:
      context: ./executor-ts
      dockerfile: Dockerfile
      args:
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
        BUILD_TIME: ${BUILD_TIME:-unknown}
    image: plan-kapkan-executor-ts:latest
    container_name: plan-kapkan-executor-ts
    restart: unless-stopped
    ports:
      - "5051:5051"
    volumes:
      - ./Executions:/app/Executions
    env_file:
      - Credentials.env
    environment:
      DRY_RUN: ${DRY_RUN:-1}
      EXECUTOR_PORT: 5051
      LOG_LEVEL: ${LOG_LEVEL:-info}
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:5051/healthz > /dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    depends_on:
      - radar
